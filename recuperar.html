<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deportes Neon — Recuperar Contraseña</title>
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🏋️</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body::before {
      background:
        radial-gradient(ellipse at 50% 20%, rgba(255, 230, 0, 0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(255, 0, 200, 0.07) 0%, transparent 50%);
    }
    .card {
      border-color: rgba(255, 230, 0, 0.2);
      box-shadow:
        0 0 40px rgba(255, 230, 0, 0.06),
        0 0 80px rgba(255, 0, 200, 0.04),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .card::before {
      border-top-color: var(--yellow);
      border-left-color: var(--yellow);
    }
    .card::after {
      border-bottom-color: var(--magenta);
      border-right-color: var(--magenta);
    }
    .form-input:focus {
      border-color: var(--yellow) !important;
      box-shadow: 0 0 0 3px rgba(255, 230, 0, 0.1) !important;
    }
    .input-wrapper:focus-within .input-icon {
      color: var(--yellow) !important;
    }
    .divider {
      background: linear-gradient(90deg, var(--yellow), var(--magenta));
    }
  </style>
</head>
<body class="auth-body">

  <div class="particles" id="particles"></div>

  <div class="card">

    <!-- Vista: Formulario de recuperación -->
    <div id="formView">
      <div class="recovery-title">
        <span class="word1">RECUPERAR</span><br>
        <span class="word2">CONTRASEÑA</span>
      </div>
      <p class="logo-sub" style="margin-top:8px;">Ingresa tu email para recibir instrucciones</p>
      <div class="divider"></div>

      <form onsubmit="handleRecovery(event)" novalidate>
        <div class="form-group">
          <label class="label-yellow">Email</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-envelope input-icon"></i>
            <input type="email" class="form-input" placeholder="usuario@ejemplo.com" id="recoveryEmail" autocomplete="email">
          </div>
        </div>

        <button type="submit" class="btn-primary btn-yellow-full" id="sendBtn">
          Enviar enlace de recuperación
        </button>
      </form>

      <a href="index.html" class="back-link">
        <span>←</span> Volver al inicio de sesión
      </a>
    </div>

    <!-- Vista: Confirmación de envío -->
    <div class="success-box" id="successView">
      <div class="success-icon">✉️</div>

      <p class="success-title">¡CORREO ENVIADO!</p>

      <p class="success-desc">
        Hemos enviado un enlace de recuperación a<br>
        <span class="success-email" id="confirmedEmail">tu@correo.com</span>
      </p>

      <p class="success-desc" style="margin-top:16px; font-size:0.85rem; color: var(--text-muted);">
        Revisa tu bandeja de entrada y también la carpeta de <strong style="color: var(--text-primary);">spam</strong>.
        El enlace expirará en <strong style="color: var(--yellow);">30 minutos</strong>.
      </p>

      <div style="margin-top: 28px; width: 100%; display: flex; flex-direction: column; gap: 12px;">
        <button class="btn-primary btn-yellow-full" onclick="resendEmail()">
          Reenviar correo
        </button>

        <a href="index.html" class="back-link" style="margin-top: 0;">
          <span>←</span> Volver al inicio de sesión
        </a>
      </div>
    </div>

  </div>

  <script src="assets/app.js"></script>
  <script>
    function handleRecovery(e) {
      e.preventDefault();
      const email = document.getElementById('recoveryEmail').value.trim();

      if (!email || !email.includes('@')) {
        showNeonAlert('Por favor ingresa un email válido', 'error');
        return;
      }

      const btn = document.getElementById('sendBtn');
      btn.textContent = 'ENVIANDO...';
      btn.disabled = true;

      setTimeout(() => {
        // Mostrar email confirmado
        document.getElementById('confirmedEmail').textContent = email;
        // Cambiar vistas con animación
        document.getElementById('formView').style.opacity = '0';
        document.getElementById('formView').style.transform = 'translateY(-20px)';
        document.getElementById('formView').style.transition = 'all 0.4s ease';

        setTimeout(() => {
          document.getElementById('formView').style.display = 'none';
          const sv = document.getElementById('successView');
          sv.classList.add('show');
          sv.style.animation = 'cardAppear 0.5s cubic-bezier(0.34,1.56,0.64,1) both';
        }, 400);
      }, 1500);
    }

    function resendEmail() {
      showNeonAlert('¡Correo reenviado exitosamente!', 'success');
    }
  </script>
</body>
</html>
